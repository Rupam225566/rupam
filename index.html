<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Computer Education</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
    background-image: url("images/background.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
}


header{
background:#e46d5f;
color:white;
padding:15px;
display:flex;
align-items:center;
}

header img{
width:70px;
height:70px;
margin-right:15px;
border-radius:50%;
}

header h1{
font-size:40px;
}

nav{
background:#0a5c16;
padding:15px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
padding:15px;
font-weight:bold;
}

nav a:hover{
background:orange;
border-radius:5px;
}

.notice{
background:#a8511d;
color:white;
padding:12px;
font-size:22px;
text-align:center;
font-weight:bold;
}

.slider{
width:90%;
margin:20px auto;
overflow:hidden;
border-radius:10px;
}

.slider img{
width:100%;
height:450px;
object-fit:cover;
}

section{
padding:40px;
text-align:center;
}

.course{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
width:250px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.card h3{
color:#0b6d1c;
margin-bottom:10px;
}

footer{
background:#0a5c16;
color:white;
padding:20px;
text-align:center;
margin-top:30px;
}
</style>
